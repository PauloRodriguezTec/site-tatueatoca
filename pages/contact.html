<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Tatu e a Toca</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1>Tatu e a Toca</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Início</a></li>
                <li><a href="./music.html">Músicas</a></li>
                <li><a href="./shows.html">Shows</a></li>
                <li><a href="./gallery.html">Galeria</a></li>
                <li><a href="./contact.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Contato</h2>
        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="email">Seu Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Mensagem:</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Enviar</button>
            <div id="statusMessage" role="status" aria-live="polite"></div>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Tatu e a Toca - Todos os direitos reservados</p>
    </footer>
    <!-- Script EmailJS - Local primeiro (mais confiável), depois CDN como fallback -->
    <script src="../libs/emailjs.min.js"></script>
    <script>
        // Fallback para CDN caso o arquivo local não tenha sido carregado
        if (typeof emailjs === "undefined") {
            console.warn("EmailJS local falhou. Tentando CDN alternativo...");
            var script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js";
            script.onerror = function() {
                console.error("Falha ao carregar EmailJS de todas as fontes.");
                var statusEl = document.getElementById("statusMessage");
                if (statusEl) {
                    statusEl.className = "error";
                    statusEl.textContent = "Erro: Não foi possível carregar EmailJS.";
                }
            };
            document.head.appendChild(script);
        }
    </script>
    <script src="../script.js"></script>
    <script src="../js/contact.js"></script>
</body>
</html>
